steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'preevent-frontend'
      - '--source'
      - '.'
      - '--region'
      - 'asia-east1'
      - '--allow-unauthenticated'
options:
  logging: CLOUD_LOGGING_ONLY
timeout: '600s'
