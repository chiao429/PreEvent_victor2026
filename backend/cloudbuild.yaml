steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    dir: 'backend'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'preevent-backend'
      - '--source'
      - '.'
      - '--region'
      - 'asia-east1'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'FIREBASE_PROJECT_ID=preevent-victor-2026'
options:
  logging: CLOUD_LOGGING_ONLY
timeout: '600s'
